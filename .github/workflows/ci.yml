name: CI

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "clippy.toml"
      - "scripts/**"
      - ".github/workflows/**"
      - "codecov.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "clippy.toml"
      - "scripts/**"
      - ".github/workflows/**"
      - "codecov.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  lint:
    name: lint (fmt + clippy + docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: debug-ubuntu
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Check docs/reference/ is up to date
        run: |
          scripts/gen-docs.sh
          git diff --exit-code docs/reference/

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: ${{ runner.os == 'Linux' && 'debug-ubuntu' || format('test-{0}', matrix.os) }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: cargo test
        run: cargo test --all-targets --locked

  msrv:
    name: msrv (1.95)
    runs-on: ubuntu-latest
    # RUSTUP_TOOLCHAIN overrides rust-toolchain.toml so this job genuinely
    # exercises the declared MSRV rather than the pinned toolchain.
    env:
      RUSTUP_TOOLCHAIN: "1.95"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: msrv
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: cargo check
        run: cargo check --all-targets --locked

  contract:
    name: contract (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Install Node.js (for Prism mock server)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install Prism CLI
        run: |
          npm install -g @stoplight/prism-cli
          prism --version

      - name: Cache OpenAPI specs (downloaded + patched)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/contract/specs
          key: contract-specs-${{ hashFiles('tests/contract/download_specs.sh', 'tests/contract/patch_specs.py') }}

      - name: Download and patch OpenAPI specs
        run: |
          bash tests/contract/download_specs.sh
          python3 tests/contract/patch_specs.py

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: debug-ubuntu
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: cargo test (ignored / contract)
        run: cargo test --locked -- --ignored

  build-release-smoke:
    name: build-release-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Cache cargo registry and target (release)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: release-${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: cargo build --release
        run: cargo build --release --locked

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      # Coverage runs both regular and contract tests in one pass via
      # `--include-ignored`, so `client/{jira,confluence}.rs` (~3k LOC of
      # HTTP code exercised only by Prism-backed contract tests) gets
      # measured. Without this the project number understates coverage by
      # ~30 percentage points.
      - name: Install Node.js (for Prism mock server)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install Prism CLI
        run: |
          npm install -g @stoplight/prism-cli
          prism --version

      - name: Cache OpenAPI specs (downloaded + patched)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/contract/specs
          key: contract-specs-${{ hashFiles('tests/contract/download_specs.sh', 'tests/contract/patch_specs.py') }}

      - name: Download and patch OpenAPI specs
        run: |
          bash tests/contract/download_specs.sh
          python3 tests/contract/patch_specs.py

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: coverage
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@db5fb34fa772531a3ece57ca434f579eb334e0fb # v2.75.30
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage (lcov)
        run: cargo llvm-cov --all-targets --locked --lcov --output-path lcov.info -- --include-ignored

      - name: Upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov (fork PR, best-effort)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          fail_ci_if_error: false

  ci-success:
    name: ci-success
    needs: [lint, test, msrv, contract, build-release-smoke, coverage]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Fail if any dependency failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
      - run: echo "All CI checks passed"
