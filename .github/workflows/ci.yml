name: CI

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "clippy.toml"
      - "scripts/**"
      - ".github/workflows/**"
      - "codecov.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "clippy.toml"
      - "scripts/**"
      - ".github/workflows/**"
      - "codecov.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  lint:
    name: lint (fmt + clippy + docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: debug-ubuntu
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Check docs/reference/ is up to date
        run: |
          scripts/gen-docs.sh
          git diff --exit-code docs/reference/

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: ${{ runner.os == 'Linux' && 'debug-ubuntu' || format('test-{0}', matrix.os) }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: cargo test
        run: cargo test --all-targets --locked

  msrv:
    name: msrv (1.95)
    runs-on: ubuntu-latest
    # RUSTUP_TOOLCHAIN overrides rust-toolchain.toml so this job genuinely
    # exercises the declared MSRV rather than the pinned toolchain.
    env:
      RUSTUP_TOOLCHAIN: "1.95"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: msrv
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: cargo check
        run: cargo check --all-targets --locked

  contract:
    name: contract (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      # When upstream @stoplight/prism-cli is fixed on npm (i.e. a version
      # published with the `dist/` directory intact, verifiable via
      # `npm view @stoplight/prism-cli@<v> dist.tarball` → the tarball contains
      # `package/dist/index.js`), we can swap the standalone-binary step below
      # back to this Node.js + npx setup. Until then, every version of
      # @stoplight/prism-cli and its transitive @stoplight/prism-core (caret
      # ranges in all published versions) resolves to a broken 5.15.7+ tarball.
      #
      # - name: Install Node.js (for Prism mock server via npx)
      #   uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      #   with:
      #     node-version: "24"
      - name: Install Prism CLI (standalone binary)
        # Upstream `@stoplight/prism-cli` >= 5.15.7 is published on npm without
        # the `dist/` directory, so `npx @stoplight/prism-cli` no longer works.
        # The standalone binaries on GitHub Releases are still usable.
        env:
          PRISM_VERSION: v5.15.9
        run: |
          sudo curl -fsSL \
            "https://github.com/stoplightio/prism/releases/download/${PRISM_VERSION}/prism-cli-linux" \
            -o /usr/local/bin/prism
          sudo chmod +x /usr/local/bin/prism
          prism --version

      - name: Cache OpenAPI specs (downloaded + patched)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/contract/specs
          key: contract-specs-${{ hashFiles('tests/contract/download_specs.sh', 'tests/contract/patch_specs.py') }}

      - name: Download and patch OpenAPI specs
        run: |
          bash tests/contract/download_specs.sh
          python3 tests/contract/patch_specs.py

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: debug-ubuntu
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: cargo test (ignored / contract)
        run: cargo test --locked -- --ignored

  build-release-smoke:
    name: build-release-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Cache cargo registry and target (release)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: release-${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: cargo build --release
        run: cargo build --release --locked

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: coverage
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.22
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage (lcov)
        run: cargo llvm-cov --all-targets --locked --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov (fork PR, best-effort)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          fail_ci_if_error: false

  ci-success:
    name: ci-success
    needs: [lint, test, msrv, contract, build-release-smoke, coverage]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Fail if any dependency failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
      - run: echo "All CI checks passed"
