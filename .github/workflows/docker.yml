name: Docker

on:
  push:
    tags:
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build the image from (e.g. v2026.18.3)'
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: verify-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Validate tag and Cargo.toml version
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"

          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]{4}\.(0[1-9]|[1-4][0-9]|5[0-3])\.[1-9][0-9]*$'; then
            echo "::error::Tag '$TAG' does not match vYYYY.WW.BUILD format" >&2
            exit 1
          fi

          CARGO_VERSION=$(cargo pkgid | awk -F'[#@]' '{print $NF}')
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG)" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: build (${{ matrix.platform-key }})
    needs: verify-version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            platform-key: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform-key: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.verify-version.outputs.tag }}

      - name: Compute lowercase image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          NAME=$(printf 'ghcr.io/%s' "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: mode=max
          sbom: true
          labels: |
            org.opencontainers.image.title=atl
            org.opencontainers.image.description=Unified CLI for Atlassian Confluence and Jira
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.verify-version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.platform-key }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform-key }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.platform-key }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  manifest:
    name: manifest
    needs: [verify-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Compute lowercase image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          NAME=$(printf 'ghcr.io/%s' "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute manifest tags
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ needs.verify-version.outputs.version }}
            type=raw,value=${{ needs.verify-version.outputs.tag }}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        shell: bash
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          META_JSON: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail
          TAGS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$META_JSON")
          SOURCES=$(printf "${IMAGE}@sha256:%s " *)
          # shellcheck disable=SC2086
          docker buildx imagetools create $TAGS $SOURCES

      - name: Inspect manifest digest
        id: manifest
        shell: bash
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          set -euo pipefail
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Smoke test
        shell: bash
        env:
          IMAGE_REF: ${{ steps.image.outputs.name }}@${{ steps.manifest.outputs.digest }}
        run: |
          set -euo pipefail
          docker run --rm "$IMAGE_REF" --version
          docker run --rm "$IMAGE_REF" --help > /dev/null

      - name: Job summary
        shell: bash
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
          VERSION: ${{ needs.verify-version.outputs.version }}
          TAG: ${{ needs.verify-version.outputs.tag }}
        run: |
          {
            echo "## Image published"
            echo
            echo "- **Image:** \`${IMAGE}\`"
            echo "- **Tags:** \`${VERSION}\`, \`${TAG}\`, \`latest\`"
            echo "- **Digest:** \`${DIGEST}\`"
            echo "- **Platforms:** linux/amd64, linux/arm64 (native runners)"
            echo
            echo "### Pin by digest in workflows"
            echo
            echo '```yaml'
            echo "- uses: docker://${IMAGE}@${DIGEST}"
            echo "  with:"
            echo "    args: jira issue list --jql 'assignee = currentUser()'"
            echo "  env:"
            echo "    ATL_API_TOKEN: \${{ secrets.ATL_TOKEN }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
