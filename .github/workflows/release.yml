name: Release

on:
  push:
    tags:
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9]*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: verify-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Validate tag and Cargo.toml version
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]{4}\.(0[1-9]|[1-4][0-9]|5[0-3])\.[1-9][0-9]*$'; then
            echo "::error::Tag '$TAG' does not match vYYYY.WW.BUILD format" >&2
            exit 1
          fi

          CARGO_VERSION=$(cargo pkgid | awk -F'[#@]' '{print $NF}')
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($VERSION). Run scripts/bump-version.sh before tagging." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

  build:
    name: build (${{ matrix.target }})
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: atl
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: atl
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: atl.exe
            archive: zip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Cache cargo registry and target (release)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: release-${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Generate man pages and completions
        shell: bash
        run: |
          set -euo pipefail
          "target/${{ matrix.target }}/release/${{ matrix.bin }}" generate-docs --output-dir dist/_docs

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.verify-version.outputs.version }}"
          NAME="atl-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${NAME}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${NAME}/"
          cp LICENSE "dist/${NAME}/"
          mkdir -p "dist/${NAME}/man" "dist/${NAME}/completions"
          cp -R dist/_docs/man/. "dist/${NAME}/man/"
          cp -R dist/_docs/completions/. "dist/${NAME}/completions/"
          tar -C dist -czf "dist/${NAME}.tar.gz" "${NAME}"
          (cd dist && shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256")

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ needs.verify-version.outputs.version }}'
          $name = "atl-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/$name/"
          Copy-Item "LICENSE" "dist/$name/"
          New-Item -ItemType Directory -Force -Path "dist/$name/man" | Out-Null
          New-Item -ItemType Directory -Force -Path "dist/$name/completions" | Out-Null
          Copy-Item "dist/_docs/man/*" "dist/$name/man/" -Recurse -Force
          Copy-Item "dist/_docs/completions/*" "dist/$name/completions/" -Recurse -Force
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$name.zip").Hash.ToLower()
          "$hash  $name.zip" | Out-File -FilePath "dist/$name.zip.sha256" -Encoding ascii -NoNewline

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: atl-${{ matrix.target }}
          path: |
            dist/atl-${{ needs.verify-version.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}
            dist/atl-${{ needs.verify-version.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}.sha256
          retention-days: 14
          if-no-files-found: error

  release:
    name: release
    needs: [verify-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: atl-*
          merge-multiple: true

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/atl-*.tar.gz
            dist/atl-*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.verify-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/atl-*
          fail_on_unmatched_files: true

  bump-homebrew-tap:
    name: bump-homebrew-tap
    needs: [verify-version, release]
    runs-on: ubuntu-latest
    # Skipped automatically when HOMEBREW_TAP_TOKEN is unset (e.g. on a fork).
    # The token must be a PAT (or fine-grained token) with `contents: write`
    # and `pull-requests: write` scope on mazuninky/homebrew-tap.
    if: ${{ !github.event.repository.fork }}
    permissions:
      contents: read
    steps:
      - name: Check token presence
        id: gate
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping homebrew-tap bump." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout homebrew-tap
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: mazuninky/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Fetch release sha256 sidecars
        if: steps.gate.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p shasums
          for target in aarch64-apple-darwin x86_64-unknown-linux-gnu; do
            asset="atl-${VERSION}-${target}.tar.gz.sha256"
            gh release download "v${VERSION}" \
              --repo "${GH_REPO}" \
              --pattern "${asset}" \
              --dir shasums
            # Sidecar layout: "<sha>  <filename>". Validate format defensively.
            line=$(cat "shasums/${asset}")
            sha=$(printf '%s\n' "$line" | awk '{print $1}')
            if ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{64}$'; then
              echo "::error::Unexpected sha256 sidecar format for ${asset}: $line" >&2
              exit 1
            fi
            printf '%s' "$sha" > "shasums/${target}.sha"
          done

      - name: Render formula
        if: steps.gate.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          set -euo pipefail
          DARWIN_SHA=$(cat shasums/aarch64-apple-darwin.sha)
          LINUX_SHA=$(cat shasums/x86_64-unknown-linux-gnu.sha)
          cat > tap/Formula/atl.rb <<EOF
          class Atl < Formula
            desc "Unified CLI for Atlassian Jira & Confluence"
            homepage "https://github.com/mazuninky/atl"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/mazuninky/atl/releases/download/v${VERSION}/atl-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${DARWIN_SHA}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/mazuninky/atl/releases/download/v${VERSION}/atl-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_SHA}"
              end
            end

            def install
              bin.install "atl"
              man1.install Dir["man/*.1"]
              bash_completion.install "completions/atl.bash" => "atl"
              zsh_completion.install "completions/_atl"
              fish_completion.install "completions/atl.fish"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/atl --version")
            end
          end
          EOF

      - name: Open pull request
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.verify-version.outputs.version }}
          SOURCE_REPO: ${{ github.repository }}
        working-directory: tap
        run: |
          set -euo pipefail
          BRANCH="bump-atl-${VERSION}"
          git config user.name "atl-release-bot"
          git config user.email "atl-release-bot@users.noreply.github.com"

          # Idempotency: if a previous run already pushed this branch, reset it
          # to the current master and replay the formula change on top.
          git fetch origin "${BRANCH}" 2>/dev/null || true
          git checkout -B "${BRANCH}"

          git add Formula/atl.rb
          if git diff --cached --quiet; then
            echo "Formula already at v${VERSION}; nothing to do."
            exit 0
          fi

          git commit -m "atl ${VERSION}"
          git push --force-with-lease origin "${BRANCH}"

          BODY=$(printf 'Auto-generated bump for atl %s.\n\nRelease: https://github.com/%s/releases/tag/v%s' \
            "${VERSION}" "${SOURCE_REPO}" "${VERSION}")

          if existing=$(gh pr view "${BRANCH}" --json number --jq '.number' 2>/dev/null); then
            gh pr edit "${existing}" --title "atl ${VERSION}" --body "${BODY}"
          else
            gh pr create \
              --title "atl ${VERSION}" \
              --body "${BODY}" \
              --base master \
              --head "${BRANCH}"
          fi
