name: skill

# Validates the Claude skill bundle: SKILL.md frontmatter shape and the
# evals.json JSON Schema, via the dq linter (mazuninky/dq). Cheap,
# scoped to skill-only paths so it does not run on Rust-only PRs.
#
# Spell-check coverage for skill/**/*.md is provided by the typos job
# in ci.yml (which runs against the entire repo) — no second pass here.

on:
  push:
    branches: [master]
    paths:
      - "skill/**"
      - ".dq/**"
      - ".github/workflows/skill.yml"
  pull_request:
    paths:
      - "skill/**"
      - ".dq/**"
      - ".github/workflows/skill.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skill-${{ github.ref }}
  cancel-in-progress: true

env:
  # ghcr.io/mazuninky/dq:v2026.20.1 — pinned by digest. Bump both the
  # comment and the digest together when upgrading dq.
  #
  # We use `docker run` (not job-level `container:`) because the dq
  # image is alpine + musl without node20, which actions/checkout v6
  # requires inside the container. Pulling the image once and reusing
  # it across two steps is cheaper than rolling a custom action.
  DQ_IMAGE: ghcr.io/mazuninky/dq@sha256:0908e6d8245d4a505594835ad3ef64a1c60f309308c108afe34d940fbaf1127f

jobs:
  dq:
    name: dq lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: dq --version
        run: docker run --rm "$DQ_IMAGE" --version

      # Verify the rule fixtures themselves still pass — catches drift in
      # the rule logic before we apply it to the real skill files.
      - name: dq test (rule fixtures)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:/work" \
            "$DQ_IMAGE" \
            test --no-color ./.dq/rules/

      # Validate the skill bundle itself. --strict promotes warn-level
      # diagnostics to errors; we want a clean wall.
      - name: dq lint (skill bundle)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:/work" \
            "$DQ_IMAGE" \
            lint \
              --rules ./.dq/rules/ \
              --no-color \
              --strict \
              skill/SKILL.md \
              skill/evals/evals.json
