# typos configuration — https://github.com/crate-ci/typos
#
# Run locally with: typos
# CI gate: .github/workflows/ci.yml (job: typos)

[files]
extend-exclude = [
  "Cargo.lock",
  "docs/reference/atl.md",
  "tests/contract/specs/**",
  "*.sha256",
  "*.snap",
  # HTML entity name table (`curren`, `ordm`, ...) + HTML test fixtures with
  # deliberately abbreviated tokens (`caf&eacute;` → `caf`). High false-positive
  # rate; the file's own tests cover entity correctness.
  "src/cli/commands/converters/storage_to_md.rs",
]

[default.extend-words]
# Both `unparseable` and `unparsable` are accepted spellings; we use the former.
unparseable = "unparseable"
# Fixture project keys / short test strings.
WRK = "WRK"
nd = "nd"

[default.extend-identifiers]
# Deliberate typo of `read_only` used by the `deny_unknown_fields` regression
# test in src/config/loader.rs — it must stay misspelled to exercise the
# unknown-key rejection path. Whitelisted as an identifier (not a word) so a
# bare `onyl` elsewhere is still flagged.
read_onyl = "read_onyl"
