coverage:
  status:
    project:
      default:
        # Hard floor for total project coverage. Auto-tracking via PR base
        # still applies on top (any drop > threshold fails), but this floor
        # documents the level we never want to dip below regardless of base.
        target: 55%
        # Small tolerance — avoids flaky failures on 0.1% noise.
        threshold: 1%
        informational: false
        only_pulls: false
    patch:
      default:
        # New/changed lines should be covered.
        target: 70%
        threshold: 1%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true

ignore:
  - "tests/**"
  - "**/tests.rs"
  - "src/main.rs"

github_checks:
  annotations: true
